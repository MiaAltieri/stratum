name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tox
        run: pip install tox
      - name: Install poetry
        run: pip install poetry
      - name: Run lint
        run: tox -e lint
